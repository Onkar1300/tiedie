# --- BLUETOOTH ---
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
 
# --- MULTI-CONNECTION (15 simultaneous) ---
CONFIG_BT_MAX_CONN=15
CONFIG_BT_MAX_PAIRED=15
 
# BT_CONN_TX_MAX valid range in NCS v3.2.x is [20, 255] – 20 is the minimum
CONFIG_BT_CONN_TX_MAX=20
 
# ACL TX buffers (note: BT_BUF_ACL_RX_COUNT does not exist in Zephyr 4.x)
CONFIG_BT_BUF_ACL_TX_COUNT=20
CONFIG_BT_BUF_ACL_TX_SIZE=251
 
# HCI command & event buffers
CONFIG_BT_BUF_CMD_TX_COUNT=25
CONFIG_BT_BUF_EVT_RX_COUNT=24
 
# Discardable events (adv reports)
CONFIG_BT_BUF_EVT_DISCARDABLE_COUNT=60
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=255
 
# ACL flow control
CONFIG_BT_HCI_ACL_FLOW_CONTROL=y
 
# --- USB STACK CONFIGURATION ---
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100
 
# --- SERIAL & CONSOLE (CDC ACM) ---
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_PRINTK=y
 
# --- MUTE SYSTEM LOGS ---
CONFIG_BOOT_BANNER=n
CONFIG_LOG=n